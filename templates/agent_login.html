<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Login - Game of Five</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 560px;
    }

    .login-card {
      width: 100%;
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      border: 2px solid #334155;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      overflow: hidden;
      position: relative;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #10b981, #06b6d4);
    }

    .login-header {
      padding: 26px 26px 18px 26px;
      border-bottom: 2px solid #334155;
    }

    .login-title {
      font-size: 24px;
      font-weight: 800;
      color: #10b981;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .login-sub {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.45;
    }

    .login-body {
      padding: 22px 26px 26px 26px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 2px solid #334155;
      color: #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.25s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.12);
    }

    /* Eye wrap */
    .input-eye-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-eye-wrap input {
      padding-right: 46px;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #64748b;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: #10b981; }

    .eye-icon {
      width: 18px;
      height: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px 18px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      transition: all 0.25s ease;
      margin-top: 6px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(16,185,129,0.25);
    }

    .btn-secondary {
      width: 100%;
      padding: 12px 18px;
      background: #334155;
      color: #cbd5e1;
      border: 2px solid #334155;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      transition: all 0.25s ease;
      margin-top: 10px;
    }

    .btn-secondary:hover {
      background: #475569;
      border-color: #475569;
      transform: translateY(-1px);
    }

    .error-box {
      margin-top: 14px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fecaca;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
    }

    .hint {
      margin-top: 12px;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.45;
    }

    .small {
      margin-top: 10px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 540px) {
      .row { grid-template-columns: 1fr; }
      .login-header, .login-body { padding: 18px; }
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">👨‍💼 Agent Login</h1>
        <div class="login-sub">
          Login to manage your users and check your salary.
        </div>
      </div>

      <div class="login-body">
        <form method="POST" action="/agent/login">
          <div class="row">

            <div class="form-group">
              <label>Username</label>
              <input name="username" autocomplete="username" placeholder="agentusername" required />
            </div>

            <div class="form-group">
              <label>Password</label>
              <div class="input-eye-wrap">
                <input
                  name="password"
                  id="agentPassword"
                  type="password"
                  autocomplete="current-password"
                  placeholder="password"
                  required
                />
                <button type="button" class="eye-btn" onclick="toggleEye('agentPassword', this)" aria-label="Show password">
                  <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

          </div>

          <button class="btn-primary" type="submit">🔐 Login</button>

          <button class="btn-secondary" type="button" onclick="window.location.href='/'">
            ⟵ Back to Home
          </button>

          {% if error %}
            <div class="error-box">{{ error }}</div>
          {% endif %}

          <div class="hint">
            Don't have credentials? Ask admin to create an agent from Admin Panel → Agents → Add Agent.
          </div>

          <div class="small">
            Note: If you are already logged in and still see this page, clear cookies or open in Incognito once.
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function toggleEye(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === "password";
      input.type = isPassword ? "text" : "password";
      btn.setAttribute("aria-label", isPassword ? "Hide password" : "Show password");
      btn.innerHTML = isPassword
        ? `<svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
           </svg>`
        : `<svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
           </svg>`;
    }
  </script>
</body>
</html>
